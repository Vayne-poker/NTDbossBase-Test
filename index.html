<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牌手基地公告 | v5.7 Poker Base Dashboard</title>

<style>

:root{
--neon-green:#2bdc73;
--poker-red:#ff3a3a;
--gold:#f5c542;
}

body{
font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
margin:0;
padding:20px;
background:radial-gradient(circle at center,#111b14 0%,#050806 100%);
background-attachment:fixed;
color:#e5e7eb;
overflow-x:hidden;
}

/* 四角花色 */

.corner-suit{
position:fixed;
font-size:30vw;
opacity:0.08;
z-index:-1;
pointer-events:none;
filter:blur(6px);
}

.top-left{top:-5%;left:2%;color:var(--neon-green);animation:suitBlink 8s infinite 0s;}
.top-right{top:-5%;right:2%;color:var(--poker-red);animation:suitBlink 8s infinite 2s;}
.bottom-left{bottom:1%;left:2%;color:var(--neon-green);animation:suitBlink 8s infinite 4s;}
.bottom-right{bottom:1%;right:2%;color:var(--poker-red);animation:suitBlink 8s infinite 6s;}

@keyframes suitBlink{
0%,100%{opacity:0.12;}
50%{opacity:0.22;}
}

/* 主框 */

.main-wrapper{
position:relative;
z-index:10;
max-width:1000px;
margin:0 auto;
padding-bottom:40px;
}

/* 手機 */

@media (max-width:768px){

body{padding:10px;}

h1{font-size:2.2em !important;}

.contact-label{
min-width:65px;
font-size:15px;
}

.contact-id{
font-size:14px;
word-break:break-all;
}

.contact-list{
padding:12px;
}

.club-grid-2,
.club-grid-3{
grid-template-columns:1fr !important;
gap:10px;
}

.platform-item{
background:rgba(255,255,255,0.04);
border-left:4px solid rgba(57,255,20,0.4);
transition:0.3s ease;
}

.platform-item:hover{
background:rgba(255,255,255,0.07);
transform:translateY(-3px);
}

.platform-logo{
width:60px;
height:60px;
}

.collapsible{
padding:15px;
font-size:17px;
}

}

/* 大螢幕 */

@media (min-width:1024px){

body{font-size:19px;}

h1{font-size:3.5em !important;}

.collapsible{
font-size:22px !important;
}

}

h1{
text-align:center;
color:var(--gold);
font-size:2.8em;
text-shadow:0 0 10px rgba(245,197,66,0.25);
letter-spacing:1px;
}

/* 按鈕 */

.collapsible{
background:linear-gradient(90deg,#111827,#1a2a1f);
color:var(--neon-green);
cursor:pointer;
padding:20px;
width:100%;
border:1px solid rgba(57,255,20,0.35);
border-radius:18px;
text-align:left;
font-size:18px;
font-weight:bold;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.collapsible:hover{
box-shadow:0 0 12px rgba(57,255,20,0.4);
transform:scale(1.01);
}

.collapsible:after{
content:'＋';
}

.collapsible.active:after{
content:'－';
}

.content{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease-out;
background:rgba(10,15,20,0.95);
backdrop-filter:blur(10px);
border-radius:0 0 18px 18px;
border:1px solid var(--neon-green);
border-top:none;
margin-top:-5px;
}

.content-inner{
padding:25px;
line-height:1.8;
}

/* 平台 */

.platform-item{
background:rgba(255,255,255,0.05);
border-left:5px solid var(--neon-green);
padding:20px;
border-radius:10px;
margin-bottom:20px;
display:flex;
gap:20px;
}

.platform-logo{
width:85px;
height:85px;
object-fit:contain;
background:#000;
padding:8px;
border-radius:10px;
}

/* club */

.club-card{
background:rgba(255,255,255,0.035);
padding:16px;
border-radius:10px;
border:1px solid rgba(245,197,66,0.25);
margin-top:12px;
line-height:1.9;
letter-spacing:0.5px;
}

.club-card strong{
color:var(--gold);
display:block;
margin-bottom:5px;
}

.club-grid-3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:15px;
}

.club-grid-2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:15px;
}

/* step */

.step-list{
display:flex;
flex-direction:column;
gap:15px;
}

.step-box{
background:rgba(57,255,20,0.05);
border:1px solid rgba(57,255,20,0.2);
padding:15px 20px;
border-radius:8px;
border-left:6px solid var(--neon-green);
}

.step-num{
color:var(--neon-green);
font-weight:bold;
font-size:1.2em;
margin-right:10px;
}

.step-arrow{
text-align:center;
color:var(--neon-green);
font-size:20px;
margin:-5px 0;
opacity:0.5;
}

/* footer */

.footer{
text-align:center;
margin-top:80px;
padding-bottom:50px;
border-top:1px solid #1f2937;
padding-top:40px;
}

.footer-title{
font-size:2.5em;
color:var(--gold);
font-weight:bold;
margin-bottom:20px;
text-shadow:0 0 15px rgba(245,197,66,0.5);
}

.footer-flex{
display:flex;
align-items:center;
justify-content:center;
gap:25px;
}

.footer-logo{
width:70px;
height:70px;
border-radius:50%;
box-shadow:0 0 15px var(--gold);
}

pre{
background:#000;
padding:15px;
color:var(--neon-green);
border-radius:8px;
font-size:16px;
border:1px solid #1a2a1f;
overflow-x:auto;
}

a{
color:var(--neon-green);
text-decoration:none;
font-weight:bold;
border-bottom:1px solid transparent;
}

a:hover{
border-bottom:1px solid var(--neon-green);
}

/* 聯絡 */

.contact-list{
display:flex;
flex-direction:column;
gap:8px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:8px;
margin-top:10px;
}

.contact-row{
display:flex;
align-items:center;
}

.contact-label{
min-width:100px;
display:inline-block;
}

.contact-id{
font-family:monospace;
color:var(--neon-green);
}

</style>
</head>
