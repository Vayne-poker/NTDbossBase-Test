<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牌手基地公告 | v4.9 精準微調</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --poker-red: #ff3a3a;
            --gold: #f5c542;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at center, #111b14 0%, #050806 100%);
            background-attachment: fixed;
            color: #d1d5db;
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* --- 1. 花色位置上移 & 常駐呼吸 (解決重疊) --- */
        .corner-suit {
            position: fixed;
            font-size: 30vw;
            opacity: 0.12; /* 原本就看得見 */
            z-index: -1;   /* 絕對置底，解決重疊感 */
            pointer-events: none;
            filter: blur(5px);
            transition: all 1s ease-in-out;
        }

        /* 呼吸動畫：從 0.12 到 0.6 */
        @keyframes glowGreen { 0%, 100% { opacity: 0.12; filter: blur(5px); } 50% { opacity: 0.6; filter: blur(0px) drop-shadow(0 0 25px var(--neon-green)); } }
        @keyframes glowRed { 0%, 100% { opacity: 0.12; filter: blur(5px); } 50% { opacity: 0.6; filter: blur(0px) drop-shadow(0 0 25px var(--poker-red)); } }

        /* 位置微調：上移至 12% */
        .top-left { top: 12%; left: 3%; color: var(--neon-green); animation: glowGreen 6s infinite 0s; }
        .top-right { top: 12%; right: 3%; color: var(--poker-red); animation: glowRed 6s infinite 3s; }
        .bottom-left { bottom: 5%; left: 3%; color: var(--neon-green); animation: glowGreen 6s infinite 0s; }
        .bottom-right { bottom: 5%; right: 3%; color: var(--poker-red); animation: glowRed 6s infinite 3s; }

        /* --- 2. 內容容器 (稍微收窄避免重疊) --- */
        .main-wrapper { 
            max-width: 850px; /* 縮窄一點點讓背景花色露出來 */
            margin: 0 auto; 
            position: relative; 
            z-index: 10; 
        }

        h1 {
            text-align: center; color: var(--gold); font-size: 2.8em;
            text-shadow: 0 0 20px rgba(245,197,66,0.6); margin: 35px 0;
        }

        .collapsible {
            background: linear-gradient(90deg, #111827, #1a2a1f);
            color: var(--neon-green); cursor: pointer; padding: 18px 25px;
            width: 100%; border: 2px solid var(--neon-green); border-radius: 10px;
            text-align: left; font-size: 20px; font-weight: bold; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .collapsible:hover { box-shadow: 0 0 20px var(--neon-green); transform: translateY(-2px); }

        .content {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: #0a0f0d;
            /* --- 3. 髮絲紋特效 --- */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 10px);
            border-radius: 0 0 10px 10px; border: 1px solid rgba(57,255,20,0.3); border-top: none;
            margin-top: -5px;
        }
        .content-inner { padding: 30px; font-size: 19px; }

        /* 卡片與列表 (維持 4.6 高質感) */
        .platform-item {
            background: rgba(255,255,255,0.04); border-left: 5px solid var(--neon-green);
            padding: 20px; border-radius: 10px; margin-bottom: 20px;
        }
        .club-card {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px;
            border: 1px solid rgba(245,197,66,0.2); margin-top: 10px;
        }
        .club-card strong { color: var(--gold); }

        pre { background: #000; padding: 15px; color: var(--neon-green); border-radius: 8px; border: 1px solid #1a2a1f; }
        
        /* 底部 Logo 對稱 */
        .footer { text-align: center; margin-top: 80px; padding-bottom: 60px; }
        .footer-logo { width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 0 15px var(--gold); vertical-align: middle; }
    </style>
</head>

<body>

<div class="corner-suit top-left">♠</div>
<div class="corner-suit top-right">♥</div>
<div class="corner-suit bottom-left">♣</div>
<div class="corner-suit bottom-right">♦</div>

<div class="main-wrapper">
    <div style="text-align:center;">
        <img src="images/base.png" style="max-width:280px; filter: drop-shadow(0 0 15px var(--neon-green));">
    </div>

    <h1>✨『牌手基地考核新制度』啟動</h1>

    <button class="collapsible">🍀 考核牌手 4.0</button>
    <div class="content">
        <div class="content-inner">
            <ul>
                <li>兩個月開啟一次考核機制</li>
                <li>一次考核為期一個月</li>
                <li>考核沒過依然可報名往後梯次</li>
            </ul>
        </div>
    </div>

    <button class="collapsible">💻 目前合作平台</button>
    <div class="content">
        <div class="content-inner">
            <div class="platform-item">
                <strong>♠ XPoker ♠</strong>
                <div class="club-card"><strong>天祥雙子</strong> ID: 999306</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div style="font-size: 2em; color: var(--gold); font-weight: bold; margin-bottom: 20px;">牌手基地保有最終解釋權</div>
        <p>
            <img src="images/NTDboss.jpg" class="footer-logo">
            <span style="margin: 0 20px;">PROFESSIONAL POKER COMMUNITY</span>
            <img src="images/NTDboss.jpg" class="footer-logo">
        </p>
    </div>
</div>

<script>
    document.querySelectorAll('.collapsible').forEach(button => {
        button.onclick = function() {
            this.classList.toggle('active');
            const content = this.nextElementSibling;
            content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
        };
    });
</script>

</body>
</html>
