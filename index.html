<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牌手基地 v8.6 穩定修正版</title>
<style>
    :root { --neon-green: #2bdc73; --gold: #f5c542; }
    body { font-family: sans-serif; background: #050806; color: #e5e7eb; margin: 0; padding: 15px; }
    .main-wrapper { max-width: 900px; margin: 0 auto; }
    
    /* 基礎按鈕樣式 */
    .collapsible, .sub-collapsible, .nested-collapsible {
        width: 100%; padding: 18px; margin-top: 10px; border-radius: 12px;
        cursor: pointer; border: 1px solid rgba(43, 220, 115, 0.3);
        background: #111827; color: var(--neon-green); font-weight: bold;
        text-align: left; display: flex; justify-content: space-between;
    }
    .content, .sub-content, .nested-content { 
        max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; 
        background: rgba(255,255,255,0.02);
    }
    .inner { padding: 15px; line-height: 1.8; }
    .announcement-box { border: 2px solid var(--neon-green); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="announcement-box">
        <h2 style="color:var(--neon-green)">🍀 考核牌手 4.0 (常駐)</h2>
        <p>報名：3/3 ~ 3/8 | 考核：3/9 ~ 3/29</p>
    </div>

    <button class="collapsible">⚔️ 考核中心 (新整合)</button>
    <div class="content">
        <div class="inner">
            <button class="sub-collapsible">💻 線上考核專區</button>
            <div class="sub-content">
                <div class="inner">
                    <p>這裡放線上考核的資料...</p>
                </div>
            </div>
            <button class="sub-collapsible">🏟️ 線下考核專區</button>
            <div class="sub-content">
                <div class="inner">
                    <p>這裡放線下店家資料...</p>
                </div>
            </div>
        </div>
    </div>

    <hr style="margin-top:50px; opacity:0.2;">
    <p style="text-align:center; color:#666">舊版內容如下</p>

    <button class="collapsible">📝 考核步驟 (舊)</button>
    <div class="content">
        <div class="inner">
            <p>原本的 Line ID 資料都在這...</p>
        </div>
    </div>
</div>

<script>
    // 採用最保險的事件監聽，避免 Code 問題
    document.addEventListener('click', function (e) {
        if (e.target.classList.contains('collapsible') || 
            e.target.classList.contains('sub-collapsible') || 
            e.target.classList.contains('nested-collapsible')) {
            
            const btn = e.target;
            btn.classList.toggle('active');
            const panel = btn.nextElementSibling;
            
            if (panel.style.maxHeight) {
                panel.style.maxHeight = null;
            } else {
                panel.style.maxHeight = panel.scrollHeight + "px";
                // 向上撐開父層高度
                let parent = panel.parentElement.closest('.content, .sub-content');
                while (parent) {
                    parent.style.maxHeight = (parent.scrollHeight + panel.scrollHeight) + "px";
                    parent = parent.parentElement.closest('.content, .sub-content');
                }
            }
        }
    });
</script>
</body>
</html>
